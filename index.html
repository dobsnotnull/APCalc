<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="style.css">

        <title>APCalc</title>

    </head>

    <body>

        <div class="text">
        
            <h1>APCalc</h1>

            <!-- I want to add an animation here (replacing the future with another word every 2s) -->

            <p>Calculate your future</p>

        </div>

        <div class="calculator">

            <input type="text" id="display" >

            <div class="buttons">

                <div class="row">

                    <button data-value="backspace" ><i data-lucide="delete"></i></button>
                    <button data-value="clear" >AC</button>
                    <button data-value="%" ><i data-lucide="percent"></i></button>
                    <button data-value="/" ><i data-lucide="divide"></i></button>

                </div>

                <div class="row">

                    <button data-value="7" >7</button>
                    <button data-value="8" >8</button>
                    <button data-value="9" >9</button>
                    <button data-value="*" ><i data-lucide="x"></i></button>

                </div>

                <div class="row">

                    <button data-value="4" >4</button>
                    <button data-value="5" >5</button>
                    <button data-value="6" >6</button>
                    <button data-value="-" ><i data-lucide="minus"></i></button>

                </div>

                <div class="row">

                    <button data-value="1" >1</button>
                    <button data-value="2" >2</button>
                    <button data-value="3" >3</button>
                    <button data-value="+" ><i data-lucide="plus"></i></button>

                </div>

                <div class="row">

                    <button data-value="history" ><i data-lucide="history"></i></button>
                    <button data-value="0" >0</button>
                    <button data-value="." >.</button>
                    <button data-value="=" ><i data-lucide="equal"></i></button>

                </div>

            </div>

        </div>

        <script src="calc.js"></script>

        <script src="https://unpkg.com/lucide@latest"></script>

        <script>lucide.createIcons(); </script>

    </body>

</html>
